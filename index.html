<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>3D CD Carousel Player</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CD Player">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

  <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: #111; 
    color: #fff; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
  }

  #app {
    width: 100%;
    max-width: 420px;
    background: #111;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* Landing Screen styling */
  #upload-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    border: 2px dashed rgba(255,255,255,0.1);
    border-radius: 20px;
    width: 100%;
    margin: 20px 0;
    background: rgba(255,255,255,0.02);
  }

  .upload-icon {
    font-size: 48px;
    color: #a855f7;
    margin-bottom: 16px;
  }

  .upload-btn {
    background: #a855f7;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    box-shadow: 0 4px 14px rgba(168, 85, 247, 0.4);
    transition: transform 0.2s;
  }

  .upload-btn:active {
    transform: scale(0.96);
  }

  #player-interface {
    display: none;
    width: 100%;
    flex-direction: column;
    align-items: center;
  }

  #scene {
    width: 100%;
    height: 260px;
    position: relative;
    perspective: 900px;
    cursor: grab;
    user-select: none;
    flex-shrink: 0;
  }
  #scene.dragging { cursor: grabbing; }
  
  #carousel {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
  }
  
  .case-wrap {
    position: absolute;
    width: 170px;
    height: 220px;
    top: 50%;
    left: 50%;
    margin: -110px -85px;
    transform-style: preserve-3d;
    cursor: pointer;
  }
  
  .case-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 4px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .case-front {
    border: 1px solid rgba(255,255,255,0.15);
    background: #222;
  }
  
  .case-spine-strip {
    width: 14px;
    height: 100%;
    background: rgba(0,0,0,0.3);
    border-right: 1px solid rgba(255,255,255,0.1);
    position: absolute;
    left: 0; top: 0; bottom: 0;
  }
  
  .case-art-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: cover;
    background-position: center;
    position: relative;
    margin-left: 14px;
  }

  .case-art-placeholder {
    font-size: 50px;
    opacity: 0.3;
  }
  
  .case-shine {
    position: absolute;
    top: 0; left: 0; right: 0; height: 100%;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%, rgba(0,0,0,0.2) 100%);
    pointer-events: none;
  }
  
  .case-footer {
    padding: 10px 10px 10px 24px;
    background: rgba(20,20,20,0.85);
    backdrop-filter: blur(5px);
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  
  .case-title { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .case-artist { font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

  #open-panel {
    width: 100%;
    margin-top: 20px;
    display: none;
    gap: 0;
    justify-content: center;
  }
  #open-panel.visible { display: flex; }
  
  .jewel-back {
    width: 180px;
    background: #181818;
    border-radius: 4px 0 0 4px;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 210px;
  }
  
  .jewel-back-tracks {
    padding: 8px;
    overflow-y: auto;
    flex: 1;
  }
  
  .track-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 4px;
    cursor: pointer;
    border-radius: 4px;
  }
  .track-row:active { background: rgba(255,255,255,0.05); }
  .track-num { font-size: 10px; color: rgba(255,255,255,0.3); width: 14px; text-align: right; }
  .track-name { font-size: 11px; color: rgba(255,255,255,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .track-name.active { color: #a855f7; font-weight: 600; }
  
  .jewel-tray {
    width: 180px;
    height: 210px;
    background: #111;
    border: 1px solid rgba(255,255,255,0.08);
    border-left: none;
    border-radius: 0 4px 4px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  
  .disc {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: conic-gradient(from 0deg,#222 0deg,#333 30deg,#1a1a1a 60deg,#2d2d2d 90deg,#141414 120deg,#3a3a3a 150deg,#222 180deg,#333 210deg,#1a1a1a 240deg,#2d2d2d 270deg,#141414 300deg,#3a3a3a 330deg,#222 360deg);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: spin 3s linear infinite;
    animation-play-state: paused;
    position: relative;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .disc.spinning { animation-play-state: running; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .disc-inner { width: 34px; height: 34px; border-radius: 50%; background: #111; border: 1px solid rgba(255,255,255,0.1); z-index: 2; }
  .disc-label-art {
    position: absolute;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    opacity: 0.8;
  }

  #player-bar {
    width: 100%;
    padding: 20px 8px;
  }
  #np-info { text-align: center; margin-bottom: 14px; }
  #np-title { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.9); display: block; }
  #np-artist { font-size: 13px; color: rgba(255,255,255,0.4); display: block; margin-top: 2px; }
  
  #prog-wrap { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; cursor: pointer; margin-bottom: 8px; }
  #prog-fill { height: 100%; background: #a855f7; border-radius: 2px; width: 0%; }
  #time-row { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 16px; }
  
  #controls { display: flex; align-items: center; justify-content: center; gap: 20px; }
  .cbtn { background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .cbtn:active { color: #fff; background: rgba(255,255,255,0.05); }
  .cbtn.primary { color: #fff; background: rgba(255,255,255,0.1); width: 50px; height: 50px; }
  .cbtn.primary:active { background: rgba(255,255,255,0.2); }
  
  .dot-row { display: flex; gap: 6px; margin-top: 12px; justify-content: center; height: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: all 0.25s; }
  .dot.active { background: #a855f7; width: 16px; border-radius: 3px; }
  #hint { font-size: 12px; color: rgba(255,255,255,0.2); text-align: center; margin-top: 10px; }
  </style>
</head>

<body>
  <div id="app">
    <div id="upload-container">
      <div class="upload-icon"><i class="ti ti-folder-music"></i></div>
      <h3>Load your Music Library</h3>
      <p style="font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 6px; padding: 0 10px;">Select your music folder. The player will automatically group your files into custom 3D CD layouts using their internal tags.</p>
      
      <input type="file" id="folder-input" webkitdirectory directory multiple style="display: none;">
      <button class="upload-btn" onclick="document.getElementById('folder-input').click()">Choose Music Folder</button>
    </div>

    <div id="player-interface">
      <div id="scene">
        <div id="carousel"></div>
      </div>
      <div class="dot-row" id="dots"></div>

      <div id="open-panel">
        <div class="jewel-back">
          <div class="jewel-back-tracks" id="track-list"></div>
        </div>
        <div class="jewel-tray">
          <div class="disc" id="disc">
            <div class="disc-label-art" id="disc-art"></div>
            <div class="disc-inner"></div>
          </div>
        </div>
      </div>

      <div id="player-bar">
        <div id="np-info">
          <span id="np-title">Swipe Carousel to Select</span>
          <span id="np-artist">Click CD to Open Drawer</span>
        </div>
        <div id="prog-wrap"><div id="prog-fill"></div></div>
        <div id="time-row"><span id="t-cur">0:00</span><span id="t-tot">0:00</span></div>
        <div id="controls">
          <button class="cbtn" id="btn-prev"><i class="ti ti-player-skip-back" style="font-size:20px"></i></button>
          <button class="cbtn" id="btn-bk"><i class="ti ti-player-track-prev" style="font-size:18px"></i></button>
          <button class="cbtn primary" id="btn-play"><i class="ti ti-player-play" style="font-size:22px" id="play-icon"></i></button>
          <button class="cbtn" id="btn-fw"><i class="ti ti-player-track-next" style="font-size:18px"></i></button>
          <button class="cbtn" id="btn-next"><i class="ti ti-player-skip-forward" style="font-size:20px"></i></button>
        </div>
      </div>
      <div id="hint">Drag to spin • Tap center to open</div>
    </div>
  </div>

  <script>
  let albums = [];
  const RADIUS = 210;
  let angleOffset = 0;
  let targetAngle = 0;
  let currentIdx = 0;
  let openedIdx = null;
  let activeTrack = 0;
  
  let audio = new Audio();
  let isPlaying = false;
  let progressTimer = null;
  
  let dragging = false;
  let dragStartX = null;
  let dragStartAngle = 0;
  let lastDragX = null;
  let velocity = 0;
  let rafId = null;

  const folderInput = document.getElementById('folder-input');
  const uploadContainer = document.getElementById('upload-container');
  const playerInterface = document.getElementById('player-interface');
  const carousel = document.getElementById('carousel');
  const scene = document.getElementById('scene');
  const dotsEl = document.getElementById('dots');
  const openPanel = document.getElementById('open-panel');
  const trackListEl = document.getElementById('track-list');
  const disc = document.getElementById('disc');
  const discArt = document.getElementById('disc-art');
  
  const npTitle = document.getElementById('np-title');
  const npArtist = document.getElementById('np-artist');
  const progFill = document.getElementById('prog-fill');
  const tCur = document.getElementById('t-cur');
  const tTot = document.getElementById('t-tot');
  const playIcon = document.getElementById('play-icon');

  // Handle Directory Input
  folderInput.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files).filter(file => file.type.startsWith('audio/') || file.name.endsWith('.mp3') || file.name.endsWith('.m4a'));
    if (files.length === 0) {
      alert("No audio files discovered inside that directory folder.");
      return;
    }

    uploadContainer.style.display = 'none';
    playerInterface.style.display = 'flex';
    
    await processAudioFiles(files);
    buildCarousel();
  });

  // Group track sorting by Metadata
  async function processAudioFiles(files) {
    const albumMap = {};

    for (let file of files) {
      await new Promise((resolve) => {
        jsmediatags.read(file, {
          onSuccess: function(tag) {
            const albName = tag.tags.album || "Unknown Album";
            const artName = tag.tags.artist || "Unknown Artist";
            let coverUrl = "";

            if (tag.tags.picture) {
              const { data, format } = tag.tags.picture;
              let base64String = "";
              for (let i = 0; i < data.length; i++) {
                base64String += String.fromCharCode(data[i]);
              }
              coverUrl = `data:${format};base64,${btoa(base64String)}`;
            }

            if (!albumMap[albName]) {
              albumMap[albName] = {
                title: albName,
                artist: artName,
                cover: coverUrl,
                tracks: []
              };
            }

            albumMap[albName].tracks.push({
              title: tag.tags.title || file.name.replace(/\.[^/.]+$/, ""),
              trackNum: tag.tags.track ? parseInt(tag.tags.track) : 999,
              file: file
            });
            resolve();
          },
          onError: function(error) {
            // Fallback for untagged tracks
            const albName = "Unknown Album";
            if (!albumMap[albName]) {
              albumMap[albName] = { title: albName, artist: "Unknown Artist", cover: "", tracks: [] };
            }
            albumMap[albName].tracks.push({
              title: file.name.replace(/\.[^/.]+$/, ""),
              trackNum: 999,
              file: file
            });
            resolve();
          }
        });
      });
    }

    // Sort tracks by track numbers
    albums = Object.values(albumMap).map(alb => {
      alb.tracks.sort((a, b) => a.trackNum - b.trackNum);
      return alb;
    });
  }

  function angleForIdx(i) { return (360 / albums.length) * i; }
  function getFrontIdx() {
    const norm = (((-angleOffset % 360) + 360) % 360);
    return Math.round(norm / (360 / albums.length)) % albums.length;
  }

  function buildCarousel() {
    carousel.innerHTML = '';
    albums.forEach((alb, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'case-wrap';
      wrap.dataset.idx = i;

      const artContent = alb.cover 
        ? `<div class="case-art-area" style="background-image: url('${alb.cover}')"></div>`
        : `<div class="case-art-area"><div class="case-art-placeholder"><i class="ti ti-music"></i></div></div>`;

      wrap.innerHTML = `
        <div class="case-face case-front">
          <div class="case-spine-strip"></div>
          ${artContent}
          <div class="case-shine"></div>
          <div class="case-footer">
            <div class="case-title">${alb.title}</div>
            <div class="case-artist">${alb.artist}</div>
          </div>
        </div>`;

      wrap.addEventListener('click', () => {
        if (Math.abs(velocity) > 0.5) return;
        const clickedIdx = parseInt(wrap.dataset.idx);
        if (clickedIdx === getFrontIdx()) {
          toggleAlbumDrawer(clickedIdx);
        } else {
          spinTo(clickedIdx);
        }
      });
      carousel.appendChild(wrap);
    });
    buildDots();
    renderCarousel(true);
  }

  function renderCarousel(immediate) {
    if(!albums.length) return;
    const wrappers = Array.from(carousel.querySelectorAll('.case-wrap'));
    const N = albums.length;
    
    wrappers.forEach((el, i) => {
      const totalRotY = angleForIdx(i) - angleOffset;
      const rad = totalRotY * Math.PI / 180;
      const z = Math.cos(rad) * RADIUS;
      const x = Math.sin(rad) * RADIUS;

      const cosVal = Math.cos(rad);
      const brightness = 0.3 + 0.7 * Math.max(0, cosVal);
      const scale = 0.8 + 0.2 * Math.max(0, cosVal);

      el.style.transform = `translateX(${x}px) translateZ(${z - RADIUS}px) rotateY(${totalRotY}deg) scale(${scale})`;
      el.style.filter = `brightness(${brightness.toFixed(2)})`;
      el.style.zIndex = Math.round((cosVal + 1) * 50);
      el.style.transition = (dragging || immediate) ? 'none' : 'transform 0.45s cubic-bezier(0.22,1,0.36,1), filter 0.35s';
      el.style.pointerEvents = cosVal > 0.2 ? 'auto' : 'none';
    });

    const fi = getFrontIdx();
    if (fi !== currentIdx) {
      currentIdx = fi;
      buildDots();
      if(openedIdx !== null && openedIdx !== currentIdx) {
        closeAlbumDrawer();
      }
    }
  }

  function spinTo(idx) {
    const N = albums.length;
    const currentNorm = ((angleOffset % 360) + 360) % 360;
    const targetNorm = (( (360/N) * idx) % 360 + 360) % 360;
    let delta = targetNorm - currentNorm;
    if (delta > 180) delta -= 360;
    if (delta < -180) delta += 360;
    targetAngle = angleOffset + delta;
    animateTo(targetAngle);
  }

  function animateTo(target) {
    cancelAnimationFrame(rafId);
    function step() {
      angleOffset += (target - angleOffset) * 0.18;
      renderCarousel();
      if (Math.abs(target - angleOffset) > 0.1) {
        rafId = requestAnimationFrame(step);
      } else {
        angleOffset = target;
        renderCarousel();
      }
    }
    rafId = requestAnimationFrame(step);
  }

  function buildDots() {
    dotsEl.innerHTML = '';
    const fi = getFrontIdx();
    albums.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === fi ? ' active' : '');
      dotsEl.appendChild(d);
    });
  }

  function toggleAlbumDrawer(idx) {
    if (openedIdx === idx) {
      closeAlbumDrawer();
    } else {
      openAlbumDrawer(idx);
    }
  }

  function openAlbumDrawer(idx) {
    openedIdx = idx;
    openPanel.classList.add('visible');
    
    if (albums[idx].cover) {
      discArt.style.backgroundImage = `url('${albums[idx].cover}')`;
    } else {
      discArt.style.backgroundImage = 'none';
    }
    
    renderTracks();
  }

  function closeAlbumDrawer() {
    openedIdx = null;
    openPanel.classList.remove('visible');
  }

  function renderTracks() {
    if (openedIdx === null) return;
    const alb = albums[openedIdx];
    trackListEl.innerHTML = '';
    
    alb.tracks.forEach((track, i) => {
      const row = document.createElement('div');
      row.className = 'track-row';
      const isCurrentActive = (openedIdx === currentIdx && i === activeTrack && !audio.paused);
      
      row.innerHTML = `
        <span class="track-num">${i+1}</span>
        <span class="track-name ${isCurrentActive ? 'active' : ''}">${track.title}</span>
      `;
      
      row.addEventListener('click', () => {
        playTrack(openedIdx, i);
      });
      trackListEl.appendChild(row);
    });
  }

  function playTrack(albumIdx, trackIdx) {
    activeTrack = trackIdx;
    const file = albums[albumIdx].tracks[trackIdx].file;
    
    audio.src = URL.createObjectURL(file);
    npTitle.textContent = albums[albumIdx].tracks[trackIdx].title;
    npArtist.textContent = albums[albumIdx].artist;
    
    audio.play().then(() => {
      isPlaying = true;
      playIcon.className = 'ti ti-player-pause';
      disc.classList.add('spinning');
      startProgressTracker();
      renderTracks();
    });
  }

  function startProgressTracker() {
    clearInterval(progressTimer);
    progressTimer = setInterval(() => {
      if (!audio.duration) return;
      const percent = (audio.currentTime / audio.duration) * 100;
      progFill.style.width = percent + '%';
      tCur.textContent = formatTime(audio.currentTime);
      tTot.textContent = formatTime(audio.duration);
    }, 250);
  }

  audio.addEventListener('ended', () => {
    nextTrack();
  });

  function formatTime(secs) {
    const m = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function togglePlay() {
    if (!albums.length) return;
    if (!audio.src) {
      playTrack(getFrontIdx(), 0);
      return;
    }
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      playIcon.className = 'ti ti-player-play';
      disc.classList.remove('spinning');
    } else {
      audio.play();
      isPlaying = true;
      playIcon.className = 'ti ti-player-pause';
      disc.classList.add('spinning');
      startProgressTracker();
    }
    renderTracks();
  }

  function nextTrack() {
    if (openedIdx === null) return;
    let nextT = activeTrack + 1;
    if (nextT < albums[openedIdx].tracks.length) {
      playTrack(openedIdx, nextT);
    } else {
      playTrack(openedIdx, 0); // Loop album
    }
  }

  function prevTrack() {
    if (openedIdx === null) return;
    let prevT = activeTrack - 1;
    if (prevT >= 0) {
      playTrack(openedIdx, prevT);
    } else {
      playTrack(openedIdx, albums[openedIdx].tracks.length - 1);
    }
  }

  document.getElementById('btn-play').addEventListener('click', togglePlay);
  document.getElementById('btn-fw').addEventListener('click', nextTrack);
  document.getElementById('btn-bk').addEventListener('click', prevTrack);
  
  document.getElementById('btn-next').addEventListener('click', () => {
    spinTo((getFrontIdx() + 1) % albums.length);
  });
  document.getElementById('btn-prev').addEventListener('click', () => {
    spinTo((getFrontIdx() - 1 + albums.length) % albums.length);
  });

  // Timeline seeking scrubber
  document.getElementById('prog-wrap').addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  // Mobile Drag Handling
  scene.addEventListener('pointerdown', e => {
    dragging = true;
    dragStartX = e.clientX;
    dragStartAngle = angleOffset;
    lastDragX = e.clientX;
    velocity = 0;
    cancelAnimationFrame(rafId);
    scene.classList.add('dragging');
    scene.setPointerCapture(e.pointerId);
  });
  scene.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dx = e.clientX - lastDragX;
    velocity = dx;
    lastDragX = e.clientX;
    angleOffset = dragStartAngle - (e.clientX - dragStartX) * 0.45;
    renderCarousel(true);
  });
  scene.addEventListener('pointerup', e => {
    if (!dragging) return;
    dragging = false;
    scene.classList.remove('dragging');
    const stepAngle = 360 / albums.length;
    if (Math.abs(velocity) > 2) {
      const fling = angleOffset - velocity * 2.5;
      animateTo(Math.round(fling / stepAngle) * stepAngle);
    } else {
      animateTo(Math.round(angleOffset / stepAngle) * stepAngle);
    }
  });
  </script>
</body>
</html>
