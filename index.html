<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>3D CD Carousel Player</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CD Player">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

  <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: #111; 
    color: #fff; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    overflow: hidden;
  }

  #app {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    position: relative;
    padding: 10px 0;
  }

  /* Upload Welcome Box */
  #upload-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    border: 2px dashed rgba(255,255,255,0.1);
    border-radius: 20px;
    width: 100%;
    margin: auto 0;
    background: rgba(255,255,255,0.02);
  }

  .upload-icon {
    font-size: 48px;
    color: #a855f7;
    margin-bottom: 16px;
  }

  .upload-btn {
    background: #a855f7;
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    box-shadow: 0 4px 14px rgba(168, 85, 247, 0.4);
  }

  #player-interface {
    display: none;
    width: 100%;
    flex-direction: column;
    align-items: center;
    flex: 1;
    justify-content: space-between;
    height: 100%;
  }

  /* Utility Header Bar */
  .top-navbar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    margin-bottom: 5px;
  }

  .tab-buttons {
    display: flex;
    gap: 6px;
  }

  .nav-tab-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-tab-btn.active {
    background: rgba(255,255,255,0.08);
    color: #a855f7;
  }

  .rescan-btn {
    background: transparent;
    border: 1px solid rgba(168, 85, 247, 0.3);
    color: #a855f7;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Interface Panels */
  .view-panel {
    width: 100%;
    flex: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .view-panel.active-view {
    display: flex;
  }

  /* 3D Scene viewport */
  #scene {
    width: 100%;
    height: 230px;
    position: relative;
    perspective: 1200px;
    transform-style: preserve-3d;
    cursor: grab;
    user-select: none;
  }
  
  #carousel {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
  }
  
  .case-wrap {
    position: absolute;
    width: 140px;
    height: 180px;
    top: 50%;
    left: 50%;
    margin: -90px -70px;
    transform-style: preserve-3d;
    backface-visibility: hidden;
  }
  
  .case-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 6px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #222;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }
  
  .case-spine-strip {
    width: 12px;
    height: 100%;
    background: linear-gradient(90deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2));
    border-right: 1px solid rgba(255,255,255,0.1);
    position: absolute;
    left: 0; top: 0;
  }
  
  .case-art-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: cover;
    background-position: center;
    background-color: #333;
    margin-left: 12px;
  }

  .case-art-placeholder {
    font-size: 36px;
    color: #a855f7;
    opacity: 0.6;
  }
  
  .case-footer {
    padding: 6px 6px 6px 18px;
    background: rgba(15,15,15,0.95);
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  
  .case-title { font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .case-artist { font-size: 10px; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

  /* Library Shelf Grid Component */
  #grid-scroll-area {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 12px 6px;
  }

  .library-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    justify-items: center;
  }

  .grid-item-card {
    width: 140px;
    height: 180px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    position: relative;
  }

  /* Sliding Tray Module Component */
  #open-panel {
    width: 100%;
    max-width: 340px;
    display: none;
    margin: 8px 0;
    justify-content: center;
  }
  #open-panel.visible { display: flex; }
  
  .jewel-back {
    width: 150px;
    background: #181818;
    border-radius: 6px 0 0 6px;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    height: 160px;
  }
  
  .jewel-back-tracks {
    padding: 6px;
    overflow-y: auto;
    flex: 1;
  }
  
  .track-row {
    display: flex;
    align-items: center;
    padding: 6px 4px;
    cursor: pointer;
    border-radius: 4px;
  }
  .track-num { font-size: 10px; color: rgba(255,255,255,0.4); width: 16px; }
  .track-name { font-size: 11px; color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .track-name.active { color: #a855f7; font-weight: 600; }
  
  .jewel-tray {
    width: 150px;
    height: 160px;
    background: #111;
    border: 1px solid rgba(255,255,255,0.1);
    border-left: none;
    border-radius: 0 6px 6px 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .disc {
    width: 115px;
    height: 115px;
    border-radius: 50%;
    background: conic-gradient(from 0deg,#222,#333,#1a1a1a,#2d2d2d,#141414,#3a3a3a,#222);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: spin 3s linear infinite;
    animation-play-state: paused;
    box-shadow: 0 4px 10px rgba(0,0,0,0.6);
  }
  .disc.spinning { animation-play-state: running; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .disc-inner { width: 24px; height: 24px; border-radius: 50%; background: #111; border: 1px solid rgba(255,255,255,0.2); z-index: 2; }
  .disc-label-art {
    position: absolute;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    opacity: 0.75;
  }

  /* Audio Lower Deck Console */
  #player-bar {
    width: 100%;
    padding: 0 20px;
  }
  #np-info { text-align: center; margin-bottom: 8px; }
  #np-title { font-size: 15px; font-weight: 600; color: #fff; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #np-artist { font-size: 12px; color: rgba(255,255,255,0.4); display: block; margin-top: 2px; }
  
  #prog-wrap { height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; margin-bottom: 6px; }
  #prog-fill { height: 100%; background: #a855f7; border-radius: 3px; width: 0%; }
  #time-row { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
  
  #controls { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .cbtn { background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .cbtn.primary { color: #fff; background: #a855f7; width: 52px; height: 52px; box-shadow: 0 4px 10px rgba(168,85,247,0.3); }
  
  .dot-row { display: flex; gap: 6px; margin: 8px 0; justify-content: center; height: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  .dot.active { background: #a855f7; width: 14px; border-radius: 3px; }
  #hint { font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; margin-bottom: 5px; }
  </style>
</head>

<body>
  <div id="app">
    <div id="upload-container">
      <div class="upload-icon"><i class="ti ti-folder-music"></i></div>
      <h3>Load Music Library</h3>
      <p style="font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 6px; padding: 0 15px;">Choose your primary music directory folder. Track indices and internal art tags will load down smoothly.</p>
      
      <input type="file" id="folder-input" webkitdirectory directory multiple style="display: none;">
      <button class="upload-btn" onclick="document.getElementById('folder-input').click()">Choose Folder</button>
    </div>

    <div id="player-interface">
      <div class="top-navbar">
        <div class="tab-buttons">
          <button class="nav-tab-btn active" id="tab-carousel-btn" onclick="switchView('carousel')">Carousel</button>
          <button class="nav-tab-btn" id="tab-grid-btn" onclick="switchView('grid')">Grid Library</button>
        </div>
        <button class="rescan-btn" onclick="document.getElementById('folder-input').click()">
          <i class="ti ti-refresh"></i> Rescan
        </button>
      </div>

      <div class="view-panel active-view" id="view-carousel">
        <div id="scene">
          <div id="carousel"></div>
        </div>
        <div class="dot-row" id="dots"></div>
      </div>

      <div class="view-panel" id="view-grid">
        <div id="grid-scroll-area">
          <div class="library-grid" id="library-grid-element"></div>
        </div>
      </div>

      <div id="open-panel">
        <div class="jewel-back">
          <div class="jewel-back-tracks" id="track-list"></div>
        </div>
        <div class="jewel-tray">
          <div class="disc" id="disc">
            <div class="disc-label-art" id="disc-art"></div>
            <div class="disc-inner"></div>
          </div>
        </div>
      </div>

      <div id="player-bar">
        <div id="np-info">
          <span id="np-title">Swipe Carousel to Navigate</span>
          <span id="np-artist">Tap Active Mid Case to Expand Tray</span>
        </div>
        <div id="prog-wrap"><div id="prog-fill"></div></div>
        <div id="time-row"><span id="t-cur">0:00</span><span id="t-tot">0:00</span></div>
        <div id="controls">
          <button class="cbtn" id="btn-prev"><i class="ti ti-player-skip-back" style="font-size:22px"></i></button>
          <button class="cbtn" id="btn-bk"><i class="ti ti-player-track-prev" style="font-size:20px"></i></button>
          <button class="cbtn primary" id="btn-play"><i class="ti ti-player-play" style="font-size:24px" id="play-icon"></i></button>
          <button class="cbtn" id="btn-fw"><i class="ti ti-player-track-next" style="font-size:20px"></i></button>
          <button class="cbtn" id="btn-next"><i class="ti ti-player-skip-forward" style="font-size:22px"></i></button>
        </div>
      </div>
      <div id="hint">Swipe or tap grid card • Click centered active case to reveal tracks</div>
    </div>
  </div>

  <script>
  let albums = [];
  const RADIUS = 155;
  let angleOffset = 0;
  let targetAngle = 0;
  let currentIdx = 0;
  let openedIdx = null;
  let activeTrack = 0;
  
  let audio = new Audio();
  let isPlaying = false;
  let progressTimer = null;
  
  let dragging = false;
  let dragStartX = null;
  let dragStartAngle = 0;
  let lastDragX = null;
  let totalDx = 0;
  let velocity = 0;
  let rafId = null;

  const folderInput = document.getElementById('folder-input');
  const uploadContainer = document.getElementById('upload-container');
  const playerInterface = document.getElementById('player-interface');
  const carousel = document.getElementById('carousel');
  const scene = document.getElementById('scene');
  const dotsEl = document.getElementById('dots');
  const openPanel = document.getElementById('open-panel');
  const trackListEl = document.getElementById('track-list');
  const disc = document.getElementById('disc');
  const discArt = document.getElementById('disc-art');
  
  const npTitle = document.getElementById('np-title');
  const npArtist = document.getElementById('np-artist');
  const progFill = document.getElementById('prog-fill');
  const tCur = document.getElementById('t-cur');
  const tTot = document.getElementById('t-tot');
  const playIcon = document.getElementById('play-icon');
  
  const gridContainer = document.getElementById('library-grid-element');

  // Handle Tab Views Change Layout Switch
  function switchView(viewName) {
    document.getElementById('view-carousel').classList.remove('active-view');
    document.getElementById('view-grid').classList.remove('active-view');
    document.getElementById('tab-carousel-btn').classList.remove('active');
    document.getElementById('tab-grid-btn').classList.remove('active');

    if (viewName === 'carousel') {
      document.getElementById('view-carousel').classList.add('active-view');
      document.getElementById('tab-carousel-btn').classList.add('active');
      renderCarousel(true);
    } else {
      document.getElementById('view-grid').classList.add('active-view');
      document.getElementById('tab-grid-btn').classList.add('active');
    }
  }

  // Handle Audio File Input Directory Reading
  folderInput.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files).filter(file => 
      file.type.startsWith('audio/') || 
      /\.(mp3|m4a|wav|aac|ogg)$/i.test(file.name)
    );
    
    if (files.length === 0) {
      alert("No readable file layouts found inside this path selection.");
      return;
    }

    uploadContainer.style.display = 'none';
    playerInterface.style.display = 'flex';
    
    closeAlbumDrawer();
    await processAudioFiles(files);
    buildCarousel();
    buildGridLibrary();
    switchView('carousel');
  });

  // Dynamic Metadata ID3 Parser Setup Engine 
  async function processAudioFiles(files) {
    const albumMap = {};

    for (let file of files) {
      await new Promise((resolve) => {
        jsmediatags.read(file, {
          onSuccess: function(tag) {
            const albName = tag.tags.album || "Unknown Album";
            const artName = tag.tags.artist || "Unknown Artist";
            let coverUrl = "";

            if (tag.tags.picture) {
              const { data, format } = tag.tags.picture;
              let base64String = "";
              for (let i = 0; i < data.length; i++) {
                base64String += String.fromCharCode(data[i]);
              }
              coverUrl = `data:${format};base64,${btoa(base64String)}`;
            }

            if (!albumMap[albName]) {
              albumMap[albName] = { title: albName, artist: artName, cover: coverUrl, tracks: [] };
            }

            albumMap[albName].tracks.push({
              title: tag.tags.title || file.name.replace(/\.[^/.]+$/, ""),
              trackNum: tag.tags.track ? parseInt(tag.tags.track) : 999,
              file: file
            });
            resolve();
          },
          onError: function() {
            const albName = "Unassigned Tracks";
            if (!albumMap[albName]) {
              albumMap[albName] = { title: albName, artist: "Local Audio", cover: "", tracks: [] };
            }
            albumMap[albName].tracks.push({
              title: file.name.replace(/\.[^/.]+$/, ""),
              trackNum: 999,
              file: file
            });
            resolve();
          }
        });
      });
    }

    albums = Object.values(albumMap).map(alb => {
      alb.tracks.sort((a, b) => a.trackNum - b.trackNum);
      return alb;
    });
  }

  function angleForIdx(i) { return (360 / albums.length) * i; }
  
  function getFrontIdx() {
    if (albums.length === 0) return 0;
    const norm = (((-angleOffset % 360) + 360) % 360);
    return Math.round(norm / (360 / albums.length)) % albums.length;
  }

  // Build Carousel System Setup
  function buildCarousel() {
    carousel.innerHTML = '';
    if(!albums.length) return;

    albums.forEach((alb, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'case-wrap';
      wrap.dataset.idx = i;

      const artContent = alb.cover 
        ? `<div class="case-art-area" style="background-image: url('${alb.cover}')"></div>`
        : `<div class="case-art-area"><div class="case-art-placeholder"><i class="ti ti-disc"></i></div></div>`;

      wrap.innerHTML = `
        <div class="case-face">
          <div class="case-spine-strip"></div>
          ${artContent}
          <div class="case-footer">
            <div class="case-title">${alb.title}</div>
            <div class="case-artist">${alb.artist}</div>
          </div>
        </div>`;

      // BUG FIX: Accurate touch-click segregation check handling
      wrap.addEventListener('click', () => {
        if (Math.abs(velocity) > 0.5 || Math.abs(totalDx) > 6) return;
        const clickedIdx = parseInt(wrap.dataset.idx);
        if (clickedIdx === getFrontIdx()) {
          toggleAlbumDrawer(clickedIdx);
        } else {
          spinTo(clickedIdx);
        }
      });
      carousel.appendChild(wrap);
    });
    buildDots();
    renderCarousel(true);
  }

  // Build Grid View Gallery Panel
  function buildGridLibrary() {
    gridContainer.innerHTML = '';
    albums.forEach((alb, i) => {
      const card = document.createElement('div');
      card.className = 'grid-item-card';
      
      const artContent = alb.cover 
        ? `<div class="case-art-area" style="background-image: url('${alb.cover}'); height: 136px; margin-left:0; border-radius:6px 6px 0 0;"></div>`
        : `<div class="case-art-area" style="height: 136px; margin-left:0; border-radius:6px 6px 0 0;"><div class="case-art-placeholder"><i class="ti ti-disc"></i></div></div>`;

      card.innerHTML = `
        <div class="case-face" style="position:relative; width:140px; height:180px; box-shadow:none; pointer-events:none;">
          <div class="case-spine-strip"></div>
          ${artContent}
          <div class="case-footer" style="padding: 6px 6px 6px 16px;">
            <div class="case-title">${alb.title}</div>
            <div class="case-artist">${alb.artist}</div>
          </div>
        </div>
      `;

      card.addEventListener('click', () => {
        switchView('carousel');
        spinTo(i);
        setTimeout(() => { openAlbumDrawer(i); }, 450);
      });

      gridContainer.appendChild(card);
    });
  }

  // 3D Rendering Vector Engine Math Calculations
  function renderCarousel(immediate) {
    if(!albums.length) return;
    const wrappers = Array.from(carousel.querySelectorAll('.case-wrap'));
    const frontIdx = getFrontIdx();
    
    wrappers.forEach((el, i) => {
      const totalRotY = angleForIdx(i) - angleOffset;
      const rad = totalRotY * Math.PI / 180;
      
      const z = Math.cos(rad) * RADIUS;
      const x = Math.sin(rad) * RADIUS;

      const cosVal = Math.cos(rad);
      const brightness = 0.35 + 0.65 * Math.max(0, cosVal);
      const scale = 0.8 + 0.2 * Math.max(0, cosVal);

      el.style.transform = `translateX(${x}px) translateZ(${z - RADIUS}px) rotateY(${totalRotY}deg) scale(${scale})`;
      el.style.filter = `brightness(${brightness.toFixed(2)})`;
      el.style.zIndex = Math.round((cosVal + 1) * 100);
      el.style.transition = (dragging || immediate) ? 'none' : 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), filter 0.3s';
      
      // BUG FIX: Strictly limit pointers to frontmost cases to block clipping interference
      el.style.pointerEvents = (i === frontIdx) || (cosVal > 0.6) ? 'auto' : 'none';
    });

    if (frontIdx !== currentIdx) {
      currentIdx = frontIdx;
      buildDots();
      if(openedIdx !== null && openedIdx !== currentIdx) {
        closeAlbumDrawer();
      }
    }
  }

  function spinTo(idx) {
    const N = albums.length;
    const currentNorm = ((angleOffset % 360) + 360) % 360;
    const targetNorm = (( (360/N) * idx) % 360 + 360) % 360;
    let delta = targetNorm - currentNorm;
    if (delta > 180) delta -= 360;
    if (delta < -180) delta += 360;
    targetAngle = angleOffset + delta;
    animateTo(targetAngle);
  }

  function animateTo(target) {
    cancelAnimationFrame(rafId);
    function step() {
      angleOffset += (target - angleOffset) * 0.2;
      renderCarousel();
      if (Math.abs(target - angleOffset) > 0.1) {
        rafId = requestAnimationFrame(step);
      } else {
        angleOffset = target;
        renderCarousel();
      }
    }
    rafId = requestAnimationFrame(step);
  }

  function buildDots() {
    dotsEl.innerHTML = '';
    const fi = getFrontIdx();
    albums.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === fi ? ' active' : '');
      dotsEl.appendChild(d);
    });
  }

  function toggleAlbumDrawer(idx) {
    if (openedIdx === idx) {
      closeAlbumDrawer();
    } else {
      openAlbumDrawer(idx);
    }
  }

  function openAlbumDrawer(idx) {
    openedIdx = idx;
    openPanel.classList.add('visible');
    discArt.style.backgroundImage = albums[idx].cover ? `url('${albums[idx].cover}')` : 'none';
    renderTracks();
  }

  function closeAlbumDrawer() {
    openedIdx = null;
    openPanel.classList.remove('visible');
  }

  function renderTracks() {
    if (openedIdx === null) return;
    const alb = albums[openedIdx];
    trackListEl.innerHTML = '';
    
    alb.tracks.forEach((track, i) => {
      const row = document.createElement('div');
      row.className = 'track-row';
      const isCurrentActive = (openedIdx === currentIdx && i === activeTrack && !audio.paused);
      
      row.innerHTML = `
        <span class="track-num">${i+1}</span>
        <span class="track-name ${isCurrentActive ? 'active' : ''}">${track.title}</span>
      `;
      
      row.addEventListener('click', () => {
        playTrack(openedIdx, i);
      });
      trackListEl.appendChild(row);
    });
  }

  function playTrack(albumIdx, trackIdx) {
    activeTrack = trackIdx;
    const file = albums[albumIdx].tracks[trackIdx].file;
    
    audio.src = URL.createObjectURL(file);
    npTitle.textContent = albums[albumIdx].tracks[trackIdx].title;
    npArtist.textContent = albums[albumIdx].artist;
    
    audio.play().then(() => {
      isPlaying = true;
      playIcon.className = 'ti ti-player-pause';
      disc.classList.add('spinning');
      startProgressTracker();
      renderTracks();
    }).catch(e => console.log("System Audio trace:", e));
  }

  function startProgressTracker() {
    clearInterval(progressTimer);
    progressTimer = setInterval(() => {
      if (!audio.duration) return;
      const percent = (audio.currentTime / audio.duration) * 100;
      progFill.style.width = percent + '%';
      tCur.textContent = formatTime(audio.currentTime);
      tTot.textContent = formatTime(audio.duration);
    }, 250);
  }

  audio.addEventListener('ended', () => { nextTrack(); });

  function formatTime(secs) {
    if(isNaN(secs)) return "0:00";
    const m = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function togglePlay() {
    if (!albums.length) return;
    if (!audio.src) {
      playTrack(getFrontIdx(), 0);
      return;
    }
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      playIcon.className = 'ti ti-player-play';
      disc.classList.remove('spinning');
    } else {
      audio.play();
      isPlaying = true;
      playIcon.className = 'ti ti-player-pause';
      disc.classList.add('spinning');
      startProgressTracker();
    }
    renderTracks();
  }

  function nextTrack() {
    if (openedIdx === null) return;
    let nextT = activeTrack + 1;
    if (nextT < albums[openedIdx].tracks.length) {
      playTrack(openedIdx, nextT);
    } else {
      playTrack(openedIdx, 0);
    }
  }

  function prevTrack() {
    if (openedIdx === null) return;
    let prevT = activeTrack - 1;
    if (prevT >= 0) {
      playTrack(openedIdx, prevT);
    } else {
      playTrack(openedIdx, albums[openedIdx].tracks.length - 1);
    }
  }

  document.getElementById('btn-play').addEventListener('click', togglePlay);
  document.getElementById('btn-fw').addEventListener('click', nextTrack);
  document.getElementById('btn-bk').addEventListener('click', prevTrack);
  
  document.getElementById('btn-next').addEventListener('click', () => {
    spinTo((getFrontIdx() + 1) % albums.length);
  });
  document.getElementById('btn-prev').addEventListener('click', () => {
    spinTo((getFrontIdx() - 1 + albums.length) % albums.length);
  });

  document.getElementById('prog-wrap').addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  // Touch Pointer Gesture Event Listeners
  scene.addEventListener('pointerdown', e => {
    if(!albums.length) return;
    dragging = true;
    dragStartX = e.clientX;
    dragStartAngle = angleOffset;
    lastDragX = e.clientX;
    totalDx = 0;
    velocity = 0;
    cancelAnimationFrame(rafId);
    scene.setPointerCapture(e.pointerId);
  });
  scene.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dx = e.clientX - lastDragX;
    totalDx = e.clientX - dragStartX;
    velocity = dx;
    lastDragX = e.clientX;
    angleOffset = dragStartAngle - totalDx * 0.45;
    renderCarousel(true);
  });
  scene.addEventListener('pointerup', e => {
    if (!dragging) return;
    dragging = false;
    const stepAngle = 360 / albums.length;
    if (Math.abs(velocity) > 1) {
      const fling = angleOffset - velocity * 2;
      animateTo(Math.round(fling / stepAngle) * stepAngle);
    } else {
      animateTo(Math.round(angleOffset / stepAngle) * stepAngle);
    }
  });
  </script>
</body>
</html>
